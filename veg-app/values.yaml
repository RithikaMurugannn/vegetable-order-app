namespace: rithika-ns

#configmap details
configmap:
  data:
    MONGO_URI: "mongodb://mongodb:27017/vegetable_order_app"
    MONGO_INITDB_DATABASE: "vegetable_order_app"

#deployment details
replicas: 2
deployment:
  labels:
    app: vegetable-order-app
  port:  3000
image:
    repository: rithika17/vegetable-order-app
    tag: v1.0.0


#service details

service:
  app: vegetable-order-app
  type: LoadBalancer
  port: 3000


#mongodb statefulset details


mongodb:
  replicas: 4
  serviceName: mongodb-svc
  app: mongodb
  containerName: mongodb-container
  repository: mongo
  tag: latest
  port: 27017
  volume:
    mountPath: /data/db
    name: mongo-data
    accessMode: ["ReadWriteOnce"]
    size: 1Gi

#mongodb service details

mongodb-service:
  name: mongodb
  port: 27017
  protocol: TCP
  clusterIP: None

#pvc details
pvc:
  accessMode: ReadWriteOnce
  size: 2Gi



#storage class details
storageClass:
  name: veg-sc
  provisioner: ebs.csi.aws.com
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer
  type: gp3

