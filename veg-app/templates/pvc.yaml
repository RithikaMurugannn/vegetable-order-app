apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes:  # How the volume will be accessed by the pods
    - {{ .Values.pvc.accessMode }}
   # - ReadOnlyMany  # multiple nodes can read, but only one node can write
   # - ReadWriteMany # multiple nodes can read/write
  resources:
    requests:
      storage: {{ .Values.pvc.size }}  # the amount of storage requested by the PVC
  storageClassName: {{ .Values.storageClass.name }}  # the name of the StorageClass to use for this PVC
