apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.mongodb-service.app }}
  ports:
    - port: {{ .Values.mongodb-service.port }}
      targetPort: {{ .Values.mongodb-service.port }}
      protocol: {{ .Values.mongodb-service.protocol}}
  clusterIP: {{ .Values.mongodb-service.clusterIP}} 
