apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-headless
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.headless.app }}
  ports:
    - port: {{ .Values.headless.port }}
      targetPort: {{ .Values.headless.port }}
      protocol: TCP
  clusterIP: {{ .Values.headless.clusterIP }}
