apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClass.name }}
  namespace: {{ .Values.namespace }}
provisioner: {{ .Values.storageClass.provisioner }}
parameters:
  type: {{ .Values.storageClass.type }}  # general purpose SSD (gp3, gp2)
reclaimPolicy: {{ .Values.storageClass.reclaimPolicy }} 
volumeBindingMode: {{ .Values.storageClass.volumeBindingMode }}  # if you dont use volumeBindingMode, it will be Immediate by default. Immediate means the PV will be created as soon as the PVC is created, regardless of whether a pod is using it or not. WaitForFirstConsumer means the PV will only be created when a pod that uses the PVC is scheduled to run. This can help optimize resource usage and ensure that PVs are only created when needed.
