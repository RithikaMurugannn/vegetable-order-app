apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vegetable-app-mongodb
  namespace: rithika-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:latest
        ports:
        - containerPort: 27017
